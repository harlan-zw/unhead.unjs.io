name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [docs-update]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache for Nuxt SEO
        uses: actions/cache@v5
        with:
          path: node_modules/.cache/nuxt-seo
          key: nuxt-seo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'nuxt.config.ts', 'content.config.ts') }}
          restore-keys: |
            nuxt-seo-${{ runner.os }}-

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - run: pnpm build
        timeout-minutes: 30
        env:
          NODE_OPTIONS: --max-old-space-size=14000
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NUXT_AI_READY_RUNTIME_SYNC_SECRET: ${{ secrets.NUXT_SEO_PRO_KEY }}
          NUXT_SEO_PRO_KEY: ${{ secrets.NUXT_SEO_PRO_KEY }}

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler pages deploy dist --project-name=unhead-unjs-io
